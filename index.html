<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
<title>Kingshot Planner Shared V14</title>
<style>
  :root { --text:#eef2ff; --muted:#b8c1d8; --line:rgba(255,255,255,.09); }
  * { box-sizing:border-box; }
  body { margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--text); background:linear-gradient(180deg,#0b1020 0%,#111827 100%); }
  .app { min-height:100vh; display:grid; grid-template-columns:300px 1fr; gap:16px; padding:16px; }
  .panel { background:rgba(17,24,39,.94); border:1px solid var(--line); border-radius:18px; padding:16px; }
  h1 { margin:0 0 10px; font-size:22px; }
  h2 { margin:16px 0 8px; font-size:15px; }
  p { margin:0 0 10px; line-height:1.45; color:#dde5f2; }
  .muted,.small { color:var(--muted); font-size:12px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  button, textarea, select, input[type="text"], input[type="password"] { width:100%; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:#0f172a; color:white; padding:10px 12px; font:inherit; }
  button { cursor:pointer; }
  button:hover { background:#16213a; }
  button.active { outline:2px solid #f6b24a; background:#1b2847; }
  button:disabled, input:disabled { opacity:.5; cursor:not-allowed; }
  textarea { min-height:110px; resize:vertical; }
  .controls { display:grid; gap:8px; margin-top:12px; }
  .type-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
  .status { margin-top:10px; font-size:12px; color:var(--muted); min-height:18px; }
  .map-wrap { background:rgba(31,41,55,.58); border:1px solid var(--line); border-radius:18px; padding:16px; overflow:auto; min-height:72vh; position:relative; touch-action:auto; }
  .map-canvas { position:relative; width:780px; height:780px; }
  .board { position:absolute; left:0; top:0; width:780px; height:780px; border-radius:18px; background:linear-gradient(180deg,#7c72d6 0%,#665bc8 100%); box-shadow:inset 0 0 0 1px rgba(255,255,255,.06); }
  .board::before { content:''; position:absolute; inset:0; border-radius:18px; background:linear-gradient(135deg, rgba(255,255,255,.14) 0, rgba(255,255,255,.14) 1px, transparent 1px, transparent 24px), linear-gradient(45deg, rgba(255,255,255,.09) 0, rgba(255,255,255,.09) 1px, transparent 1px, transparent 24px); background-size:24px 24px; opacity:.34; pointer-events:none; }
  svg { position:absolute; inset:0; width:100%; height:100%; }
  .labels { position:absolute; inset:0; pointer-events:none; }
  .slot-name { position:absolute; transform:translate(-50%,-50%); max-width:78px; text-align:center; font-size:7px; font-weight:800; line-height:1.05; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 3px rgba(0,0,0,.55); }
  .bt-asset { position:absolute; transform:translate(-50%,-50%); width:22px; height:22px; object-fit:contain; object-position:center; pointer-events:none; filter:drop-shadow(0 4px 8px rgba(0,0,0,.28)); }
  .popup { position:absolute; display:none; z-index:10; transform:translate(-50%,-110%); background:rgba(15,23,42,.96); border:1px solid rgba(255,255,255,.14); border-radius:10px; padding:6px; gap:6px; min-width:138px; box-shadow:0 10px 25px rgba(0,0,0,.25); }
  .popup.show { display:grid; }
  .popup button { padding:7px 8px; font-size:12px; }
  @media (max-width:980px) { .app { grid-template-columns:1fr; } .panel { order:2; } .map-wrap { order:1; min-height:58vh; } }
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <h1>Kingshot Planner Shared V14</h1>
    <p>Interfaccia semplificata: scelta colore rimossa del tutto, così restano solo i controlli utili e non compare più un menu non funzionante.</p>

    <h2>Accesso</h2>
    <input id="editorKey" type="password" placeholder="Editor key opzionale" />

    <h2>Tipo oggetto</h2>
    <div class="type-grid">
      <button data-type="city" class="type-btn active">Città 2x2</button>
      <button data-type="hq" class="type-btn">HQ 2x2</button>
      <button data-type="banner" class="type-btn">Stendardo 1x1</button>
      <button data-type="empty" class="type-btn">Slot vuoto 1x1</button>
      <button data-type="bt" class="type-btn">Bear Trap 3x3</button>
    </div>

    <h2>Impostazioni</h2>
    <div class="grid2">
      <input id="nextName" type="text" maxlength="16" placeholder="Nome slot" value="C01" />
    </div>
    <div class="small" id="placementInfo">Piazzamento attivo: Città 2x2.</div>

    <h2>Slot selezionato</h2>
    <div class="small" id="selectedInfo">Nessuno slot selezionato.</div>
    <div class="controls">
      <input id="selectedName" type="text" maxlength="16" placeholder="Nome città selezionata" disabled />
      <button id="cancelMove" disabled>Annulla spostamento</button>
    </div>

    <div class="controls">
      <button id="saveNow">Salva online</button>
      <button id="clearAll">Svuota mappa</button>
      <button id="reloadBtn">Ricarica dal server</button>
      <button id="exportJson">Esporta JSON</button>
      <textarea id="jsonBox" placeholder="Export JSON del layout condiviso"></textarea>
    </div>

    <div class="status" id="status"></div>
  </aside>

  <main class="map-wrap" id="mapWrap">
    <div class="map-canvas" id="mapCanvas">
      <div class="board" id="board">
        <svg id="svg" viewBox="0 0 1020 1020"></svg>
        <div class="labels" id="labels"></div>
        <div class="popup" id="popup">
          <button id="moveBtn">Sposta</button>
          <button id="deleteBtn">Cancella</button>
        </div>
      </div>
    </div>
  </main>
</div>
<script>
const DEMO_MODE = false;
const DEMO_STATE = {"slots": [], "updatedAt": null};
const HQ_SRC = './assets/hq-castle.png';
const BANNER_SRC = './assets/banner-flag.png';
const BEAR_SRC = './assets/bear-icon.png';
const UNIT = 30;
const HALF = UNIT / 2;
const OFF_X = 510;
const OFF_Y = 120;
const GRID_MIN = 0;
const GRID_MAX = 26;
const MAIN_BT = { x: 12, y: 12, size: 3 };
const BOARD_VIEW = 1020;
const palette = { cyan:'#5ad6d1', green:'#89d64e', pink:'#ff92ca', orange:'#f6b24a', purple:'#a98bf6' };
const typeLabels = { city:'Città 2x2', hq:'HQ 2x2', banner:'Stendardo 1x1', empty:'Slot vuoto 1x1', bt:'Bear Trap 3x3' };
const svg = document.getElementById('svg');
const labels = document.getElementById('labels');
const board = document.getElementById('board');
const mapWrap = document.getElementById('mapWrap');
const popup = document.getElementById('popup');
const moveBtn = document.getElementById('moveBtn');
const deleteBtn = document.getElementById('deleteBtn');
const cancelMoveBtn = document.getElementById('cancelMove');
const saveNowBtn = document.getElementById('saveNow');
const reloadBtn = document.getElementById('reloadBtn');
const clearAllBtn = document.getElementById('clearAll');
const jsonBox = document.getElementById('jsonBox');
const nextName = document.getElementById('nextName');
const placementInfo = document.getElementById('placementInfo');
const statusBox = document.getElementById('status');
const editorKey = document.getElementById('editorKey');
const selectedInfo = document.getElementById('selectedInfo');
const selectedName = document.getElementById('selectedName');
let activeType = 'city';
let selectedId = null;
let moveMode = false;
let state = { slots: [], updatedAt: null };
let dirty = false;
let isSaving = false;
let initialCentered = false;

function project(gx, gy) { return { x: (gx - gy) * HALF + OFF_X, y: (gx + gy) * HALF + OFF_Y }; }
function diamondPoints(cx, cy, span) { return `${cx},${cy - span} ${cx + span},${cy} ${cx},${cy + span} ${cx - span},${cy}`; }
function sizeForType(type) { return type === 'city' || type === 'hq' ? 2 : type === 'bt' ? 3 : 1; }
function footprint(slot) {
  const size = sizeForType(slot.type);
  const cells = [];
  for (let dy = 0; dy < size; dy++) for (let dx = 0; dx < size; dx++) cells.push([slot.x + dx, slot.y + dy]);
  return cells;
}
function slotCenter(slot) {
  const size = sizeForType(slot.type);
  const anchor = project(slot.x, slot.y);
  return { x: anchor.x, y: anchor.y + (size - 1) * HALF };
}
function cellPolygon(gx, gy, fill, stroke, width=1) {
  const p = project(gx, gy);
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  poly.setAttribute('points', diamondPoints(p.x, p.y, HALF));
  poly.setAttribute('fill', fill);
  poly.setAttribute('stroke', stroke);
  poly.setAttribute('stroke-width', width);
  return poly;
}
function protectedMainBT(x, y) { return x >= MAIN_BT.x && x < MAIN_BT.x + MAIN_BT.size && y >= MAIN_BT.y && y < MAIN_BT.y + MAIN_BT.size; }
function slotBlocksCell(slot, x, y) { return footprint(slot).some(([sx,sy]) => sx === x && sy === y); }
function occupiedByOther(x, y, ignoreId=null) { return state.slots.some(slot => slot.id !== ignoreId && slotBlocksCell(slot, x, y)); }
function canPlaceType(type, x, y, ignoreId=null) {
  const size = sizeForType(type);
  const cells = [];
  for (let dy = 0; dy < size; dy++) for (let dx = 0; dx < size; dx++) cells.push([x + dx, y + dy]);
  return cells.every(([cx,cy]) => cx >= GRID_MIN && cy >= GRID_MIN && cx <= GRID_MAX && cy <= GRID_MAX && !protectedMainBT(cx,cy) && !occupiedByOther(cx,cy,ignoreId));
}
function nextAutoName() { return `C${String(state.slots.filter(s => s.type === 'city').length + 1).padStart(2,'0')}`; }
function defaultNameFor(type) { if (type === 'city') return nextAutoName(); if (type === 'hq') return 'HQ'; if (type === 'bt') return 'BT'; return ''; }
function getSelected() { return state.slots.find(s => s.id === selectedId) || null; }
function setStatus(t='') { statusBox.textContent = t; }
function hidePopup() { popup.classList.remove('show'); }
function clearSelection() { selectedId = null; hidePopup(); updateInspector(); }
function markDirty() { dirty = true; }
function normalize(remote) {
  const slots = Array.isArray(remote?.slots) ? remote.slots : [];
  return { slots: slots.map(s => ({ id: s.id || Date.now()+Math.floor(Math.random()*9999), x:+s.x||0, y:+s.y||0, type:['city','hq','banner','empty','bt'].includes(s.type)?s.type:'city', name:(s.name||'').toString().slice(0,16), color: palette[s.color] ? s.color : 'cyan' })), updatedAt: remote?.updatedAt || null };
}
function updatePlacementInfo() {
  placementInfo.textContent = `Piazzamento attivo: ${typeLabels[activeType]}.`;
}

function updateInspector() {
  const slot = getSelected();
  if (!slot) {
    selectedInfo.textContent = 'Nessuno slot selezionato.';
    selectedName.value = '';
    selectedName.disabled = true;
    return;
  }
  selectedInfo.textContent = `${typeLabels[slot.type]} · ${slot.x},${slot.y}`;
  selectedName.value = slot.name || '';
  selectedName.disabled = false;
}

async function apiLoad() {
  const res = await fetch('/.netlify/functions/layout');
  if (!res.ok) throw new Error('Errore lettura server');
  return normalize(await res.json());
}
async function apiSave() {
  if (DEMO_MODE) { setStatus('Questa è solo la preview locale.'); return; }
  if (isSaving) return;
  isSaving = true;
  try {
    const res = await fetch('/.netlify/functions/layout', { method:'POST', headers:{ 'Content-Type':'application/json', 'x-editor-key': editorKey.value || '' }, body: JSON.stringify(state) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Errore salvataggio');
    state = normalize(data); dirty = false; redraw(false); setStatus('Salvato online.');
  } catch (e) { setStatus(e.message || 'Errore salvataggio'); } finally { isSaving = false; }
}
async function loadFromServer(silent=false) {
  if (DEMO_MODE) {
    state = normalize(DEMO_STATE); nextName.value = defaultNameFor(activeType); redraw(true); if (!silent) setStatus('Preview locale caricata.'); return;
  }
  try {
    const remote = await apiLoad();
    if (!dirty || remote.updatedAt !== state.updatedAt) { state = remote; nextName.value = defaultNameFor(activeType); redraw(true); if (!silent) setStatus('Mappa aggiornata dal server.'); }
  } catch (e) { if (!silent) setStatus('Errore nel caricamento dal server.'); }
}
function centerView() {
  const left = Math.max(0, (board.clientWidth - mapWrap.clientWidth) / 2);
  const top = Math.max(0, (board.clientHeight - mapWrap.clientHeight) / 2);
  mapWrap.scrollLeft = left;
  mapWrap.scrollTop = top;
}
function showPopupFor(slot) {
  const c = slotCenter(slot);
  popup.style.left = `${(c.x/BOARD_VIEW)*board.clientWidth}px`;
  popup.style.top = `${(c.y/BOARD_VIEW)*board.clientHeight - 30}px`;
  popup.classList.add('show');
}
function startMove() {
  if (!selectedId) return;
  moveMode = true; cancelMoveBtn.disabled = false; hidePopup();
  const slot = getSelected();
  if (slot) setStatus(`Spostamento attivo: scegli una casella valida per ${slot.name || typeLabels[slot.type]}.`);
}
function cancelMove() { moveMode = false; cancelMoveBtn.disabled = true; }
function deleteSelected() {
  if (!selectedId) return;
  state.slots = state.slots.filter(s => s.id !== selectedId); clearSelection(); cancelMove(); markDirty(); redraw(false);
}
function createSlotAt(x, y) {
  const type = activeType;
  if (!canPlaceType(type, x, y)) return;
  const slot = { id: Date.now()+Math.floor(Math.random()*1000), x, y, type, name: (nextName.value || defaultNameFor(type)).trim().slice(0,16), color: 'cyan' };
  state.slots.push(slot);
  nextName.value = defaultNameFor(type);
  markDirty();
  redraw(false);
}
function handleAnchorClick(x, y) {
  if (moveMode && selectedId) {
    const current = getSelected();
    if (!current) return;
    if (!canPlaceType(current.type, x, y, current.id)) { setStatus('Posizione non valida.'); return; }
    current.x = x; current.y = y; markDirty(); cancelMove(); clearSelection(); redraw(false); return;
  }
  createSlotAt(x, y);
}
function renderGrid() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  for (let y = GRID_MIN; y <= GRID_MAX; y++) for (let x = GRID_MIN; x <= GRID_MAX; x++) g.appendChild(cellPolygon(x, y, 'rgba(255,255,255,.045)', 'rgba(255,255,255,.14)', .8));
  svg.appendChild(g);
}
function renderAnchors() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  for (let y = GRID_MIN; y <= GRID_MAX; y++) {
    for (let x = GRID_MIN; x <= GRID_MAX; x++) {
      if (protectedMainBT(x,y)) continue;
      const type = moveMode && selectedId ? getSelected()?.type || activeType : activeType;
      const allowed = canPlaceType(type, x, y, moveMode ? selectedId : null);
      const c = project(x, y);
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      hit.setAttribute('cx', c.x); hit.setAttribute('cy', c.y); hit.setAttribute('r', allowed ? 4.6 : 3.1);
      hit.setAttribute('fill', allowed ? 'rgba(255,255,255,.18)' : 'rgba(0,0,0,.08)');
      hit.setAttribute('stroke', allowed ? 'rgba(255,255,255,.22)' : 'rgba(255,255,255,.05)');
      hit.setAttribute('stroke-width', '1');
      hit.style.cursor = allowed ? 'pointer' : 'default';
      if (allowed) hit.addEventListener('click', () => handleAnchorClick(x, y));
      g.appendChild(hit);
    }
  }
  svg.appendChild(g);
}
function addText(cls, x, y, text) {
  const d = document.createElement('div'); d.className = cls; d.textContent = text;
  d.style.left = `${(x/BOARD_VIEW)*board.clientWidth}px`; d.style.top = `${(y/BOARD_VIEW)*board.clientHeight}px`; labels.appendChild(d);
}
function addImage(cls, x, y, src, w=40, h=40) {
  const img = document.createElement('img');
  img.className = cls;
  img.src = src;
  img.style.left = `${(x/BOARD_VIEW)*board.clientWidth}px`;
  img.style.top = `${(y/BOARD_VIEW)*board.clientHeight}px`;
  img.style.width = `${w}px`;
  img.style.height = `${h}px`;
  labels.appendChild(img);
}
function renderCompositeCells(slot, fill, stroke) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  footprint(slot).forEach(([x,y]) => g.appendChild(cellPolygon(x, y, fill, stroke, 1.05)));
  return g;
}
function renderSlotShape(slot) {
  if (slot.type === 'city') return renderCompositeCells(slot, palette[slot.color] || palette.cyan, 'rgba(0,0,0,.34)');
  if (slot.type === 'hq') return renderCompositeCells(slot, 'rgba(90,214,209,.20)', 'rgba(0,0,0,.30)');
  if (slot.type === 'bt') return renderCompositeCells(slot, '#111827', 'rgba(255,255,255,.14)');
  if (slot.type === 'empty') return cellPolygon(slot.x, slot.y, 'rgba(169,139,246,.28)', 'rgba(255,255,255,.20)', 1.1);
  return cellPolygon(slot.x, slot.y, 'rgba(90,214,209,.18)', 'rgba(0,0,0,.28)', 1);
}
function renderSlotOutline(slot, c) {
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  poly.setAttribute('points', diamondPoints(c.x, c.y, sizeForType(slot.type) * HALF));
  poly.setAttribute('fill', 'none');
  poly.setAttribute('stroke', slot.id === selectedId ? 'rgba(255,255,255,.96)' : 'rgba(0,0,0,.45)');
  poly.setAttribute('stroke-width', slot.id === selectedId ? 3 : 1.3);
  return poly;
}
function renderSlotOverlay(slot, c) {
  if (slot.type === 'hq' || slot.type === 'banner') {
    const img = document.createElement('img');
    img.src = slot.type === 'hq' ? HQ_SRC : BANNER_SRC;
    img.alt = slot.type === 'hq' ? 'HQ' : 'Stendardo';
    img.style.position = 'absolute';
    img.style.pointerEvents = 'none';
    img.style.left = `${(c.x/BOARD_VIEW)*board.clientWidth}px`;
    img.style.top = `${(c.y/BOARD_VIEW)*board.clientHeight}px`;
    img.style.transform = slot.type === 'hq' ? 'translate(-50%, -60%)' : 'translate(-50%, -62%)';
    img.style.width = slot.type === 'hq' ? '42px' : '10px';
    img.style.filter = 'drop-shadow(0 8px 14px rgba(0,0,0,.24))';
    labels.appendChild(img);
    return;
  }
  if (slot.type === 'bt') {
    renderBTRichOverlay(c);
  }
}
function renderLabels(slot, c) {
  if (slot.type === 'bt') return;
  if (slot.name) addText('slot-name', c.x, c.y - 1, slot.name);
}

function renderBTRichOverlay(c) {
  addImage('bt-asset', c.x, c.y - 4, BEAR_SRC, 22, 22);
  addText('slot-name', c.x, c.y + 16, 'BT');
}
function renderMainBearTrap() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  for (let yy=0; yy<MAIN_BT.size; yy++) for (let xx=0; xx<MAIN_BT.size; xx++) g.appendChild(cellPolygon(MAIN_BT.x+xx, MAIN_BT.y+yy, '#111827', 'rgba(255,255,255,.14)', 1.2));
  const slot = { type:'bt', x:MAIN_BT.x, y:MAIN_BT.y };
  const c = slotCenter(slot);
  const outline = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  outline.setAttribute('points', diamondPoints(c.x, c.y, 3 * HALF));
  outline.setAttribute('fill', 'none'); outline.setAttribute('stroke', 'rgba(255,255,255,.25)'); outline.setAttribute('stroke-width', 2); g.appendChild(outline);
  svg.appendChild(g);
}
function renderSlots() {
  labels.innerHTML = '';
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  state.slots.forEach(slot => {
    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    group.style.cursor = 'pointer';
    group.appendChild(renderSlotShape(slot));
    const c = slotCenter(slot);
    group.appendChild(renderSlotOutline(slot, c));
    group.addEventListener('click', (e) => { e.stopPropagation(); selectedId = slot.id; moveMode = false; cancelMoveBtn.disabled = true; redraw(false); setStatus(`Selezionato: ${slot.name || typeLabels[slot.type]}.`); });
    g.appendChild(group);
    renderSlotOverlay(slot, c);
    renderLabels(slot, c);
  });
  svg.appendChild(g);
  const selected = getSelected(); if (selected) showPopupFor(selected); else hidePopup();
}
function redraw(forceCenter) {
  svg.innerHTML = '';
  labels.innerHTML = '';
  renderGrid(); renderAnchors(); renderMainBearTrap(); renderSlots();
  const defaultBTCenter = slotCenter({ type:'bt', x:MAIN_BT.x, y:MAIN_BT.y });
  renderBTRichOverlay(defaultBTCenter);
  updateInspector(); updatePlacementInfo();
  if (forceCenter || !initialCentered) { requestAnimationFrame(() => { centerView(); initialCentered = true; }); }
}

document.querySelectorAll('.type-btn').forEach(btn => btn.addEventListener('click', () => {
  activeType = btn.dataset.type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b === btn));
  nextName.value = defaultNameFor(activeType);
  redraw(false);
}));
moveBtn.addEventListener('click', startMove);
deleteBtn.addEventListener('click', deleteSelected);
cancelMoveBtn.addEventListener('click', () => { clearSelection(); cancelMove(); redraw(false); });
clearAllBtn.addEventListener('click', () => { if (DEMO_MODE) { state = normalize(DEMO_STATE); redraw(true); setStatus('Preview ripristinata.'); return; } state.slots = []; clearSelection(); cancelMove(); nextName.value = defaultNameFor(activeType); markDirty(); redraw(false); });
reloadBtn.addEventListener('click', () => loadFromServer(true));
saveNowBtn.addEventListener('click', apiSave);
document.getElementById('exportJson').addEventListener('click', () => { jsonBox.value = JSON.stringify(state, null, 2); });
selectedName.addEventListener('input', e => { const s = getSelected(); if (!s) return; s.name = e.target.value.slice(0,16); markDirty(); redraw(false); });
window.addEventListener('resize', () => setTimeout(centerView, 60));
if (!DEMO_MODE) setInterval(() => { if (!dirty) loadFromServer(false); }, 5000);
nextName.value = defaultNameFor(activeType);
loadFromServer(true);
</script>
</body>
</html>
